<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMS Ultimate TPMS Dashboard</title>
  <!-- Tailwind CSS CDN 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    /* 애니메이션 효과 커스텀 정의 */
    @keyframes alertDash {
      to {
        stroke-dashoffset: -10;
      }
    }
    .animate-dash {
      stroke-dasharray: 4, 3;
      animation: alertDash 0.8s linear infinite;
    }
  </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

  <!-- FMS 차량 상세 카드 프리미엄 컨테이너 (화이트 모던 테마) -->
  <div class="w-full max-w-sm bg-white border border-gray-100 rounded-3xl p-6 shadow-xl shadow-gray-200/50 text-gray-800">
    
    <!-- ==========================================
         [ 최고 고도화 TPMS 컴포넌트 시작 ]
         ========================================== -->
    <div class="border-t border-gray-100 pt-4">
      <div class="flex items-center justify-between mb-1">
        <h5 class="text-sm font-bold text-gray-800 tracking-wide">TPMS 실시간 공기압</h5>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[10px] font-black bg-rose-50 text-rose-500 border border-rose-100 animate-pulse">
          <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>후좌측 압력 저하
        </span>
      </div>
      <p class="mb-6 text-[11px] text-gray-400">
        최근 동기화: 방금 전 (Telemetry Stream 라이브)
      </p>
      
      <!-- 차량 탑뷰 관제 레이아웃 콘텍스트 -->
      <div class="relative mx-auto w-full max-w-[320px] py-4 select-none">
        
        <!-- 🚗 [Ultimate] 기존 차량 색상(화이트-실버 그라데이션) 적용 본체 -->
        <div class="relative mx-auto h-56 w-26 bg-gradient-to-b from-slate-100 to-slate-200 border border-slate-300 shadow-[inset_0_3px_6px_rgba(255,255,255,0.9),0_12px_24px_-8px_rgba(15,23,42,0.15)]"
             style="border-radius: 36px 36px 24px 24px;">
          
          <!-- 좌우 사이드 미러 (기존 색상 매칭) -->
          <div class="absolute -left-2.5 top-16 w-2.5 h-3 bg-slate-300 rounded-l-full border-y border-l border-slate-400/60 shadow-sm"></div>
          <div class="absolute -right-2.5 top-16 w-2.5 h-3 bg-slate-300 rounded-r-full border-y border-r border-slate-400/60 shadow-sm"></div>

          <!-- 전면부 헤드라이트 그래픽 -->
          <div class="absolute top-[3px] left-2.5 w-3 h-1 bg-amber-200 rounded-full opacity-70"></div>
          <div class="absolute top-[3px] right-2.5 w-3 h-1 bg-amber-200 rounded-full opacity-70"></div>

          <!-- 앞유리 (Windshield with Gradients) -->
          <div class="absolute top-[34px] left-1.5 right-1.5 h-11 bg-gradient-to-b from-slate-400/20 to-slate-500/40 border-t border-b border-white/40 shadow-inner"
               style="border-radius: 20px 20px 4px 4px;"></div>
          
          <!-- 파노라마 글래스 루프 (Premium Glass Roof Accent) -->
          <div class="absolute top-[88px] left-1.5 right-1.5 h-20 bg-gradient-to-b from-slate-500/40 to-slate-600/50 border-b border-white/30 flex items-center justify-center"
               style="border-radius: 4px 4px 16px 16px;">
            <!-- 루프 센터 크로스바 라인 -->
            <div class="w-[1px] h-full bg-white/20"></div>
          </div>
          
          <!-- 보닛 기하학 라인 -->
          <div class="absolute top-[18px] left-6 right-6 h-[1.5px] bg-slate-300/80"></div>
          
          <!-- 후면 테일램프 일체형 라인 -->
          <div class="absolute bottom-[2px] left-3 right-3 h-[2.5px] bg-red-500 rounded-full opacity-80 shadow-[0_1px_3px_rgba(239,68,68,0.4)]"></div>
        </div>

        <!-- 🛞 초정밀 타이어 및 지능형 가이드 라인 레이어 -->
        
        <!-- SVG 인디케이터 라인 레이어 (HTML 요소 간 오차 없는 정밀 바인딩) -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
          <!-- 정상 라인들 -->
          <line x1="104" y1="52" x2="124" y2="52" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="2 2" />
          <line x1="196" y1="52" x2="216" y2="52" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="2 2" />
          <line x1="196" y1="184" x2="216" y2="184" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="2 2" />
          <!-- 경고 애니메이션 라인 (후좌) -->
          <line x1="104" y1="184" x2="124" y2="184" stroke="#f43f5e" stroke-width="1.2" class="animate-dash" />
        </svg>

        <!-- [1] 전좌 (Front-Left) -->
        <div class="flex items-center absolute top-7 left-1 w-[105px] justify-end gap-3">
          <div class="flex flex-col items-end">
            <span class="text-sm font-black text-gray-800 leading-none">42</span>
            <span class="text-[9px] text-emerald-600 font-bold mt-1 bg-emerald-50 px-1 rounded border border-emerald-100">정상</span>
          </div>
          <!-- 리얼 트레드 타이어 모듈 -->
          <div class="w-4 h-12 bg-slate-800 rounded border-y border-slate-650 flex flex-col justify-between items-center py-0.5 shadow-md">
            <span class="w-full h-[1px] bg-slate-600/50"></span>
            <div class="w-2 h-5 bg-gradient-to-r from-slate-500 to-slate-400 rounded-sm flex items-center justify-center">
              <span class="w-1 h-3 bg-emerald-400/40 rounded-full"></span>
            </div>
            <span class="w-full h-[1px] bg-slate-600/50"></span>
          </div>
        </div>

        <!-- [2] 전우 (Front-Right) -->
        <div class="flex items-center absolute top-7 right-1 w-[105px] justify-start gap-3">
          <!-- 리얼 트레드 타이어 모듈 -->
          <div class="w-4 h-12 bg-slate-800 rounded border-y border-slate-650 flex flex-col justify-between items-center py-0.5 shadow-md">
            <span class="w-full h-[1px] bg-slate-600/50"></span>
            <div class="w-2 h-5 bg-gradient-to-r from-slate-500 to-slate-400 rounded-sm flex items-center justify-center">
              <span class="w-1 h-3 bg-emerald-400/40 rounded-full"></span>
            </div>
            <span class="w-full h-[1px] bg-slate-600/50"></span>
          </div>
          <div class="flex flex-col items-start">
            <span class="text-sm font-black text-gray-800 leading-none">42</span>
            <span class="text-[9px] text-emerald-600 font-bold mt-1 bg-emerald-50 px-1 rounded border border-emerald-100">정상</span>
          </div>
        </div>

        <!-- [3] 후좌 (Rear-Left) - ALERT STATE -->
        <div class="flex items-center absolute bottom-7 left-1 w-[105px] justify-end gap-3">
          <div class="flex flex-col items-end">
            <span class="text-sm font-black text-rose-500 leading-none">37</span>
            <span class="text-[9px] text-rose-500 font-bold mt-1 bg-rose-50 px-1 rounded border border-rose-100">주의</span>
          </div>
          <!-- 위험 상태 다이내믹 이펙트 타이어 -->
          <div class="w-4 h-12 bg-slate-800 rounded border border-rose-500 flex flex-col justify-between items-center py-0.5 shadow-lg shadow-rose-100 animate-pulse">
            <span class="w-full h-[1px] bg-rose-500/30"></span>
            <div class="w-2 h-5 bg-gradient-to-r from-rose-950 to-rose-900 rounded-sm flex items-center justify-center">
              <span class="w-1 h-3 bg-rose-400 rounded-full animate-ping"></span>
            </div>
            <span class="w-full h-[1px] bg-rose-500/30"></span>
          </div>
        </div>

        <!-- [4] 후우 (Rear-Right) -->
        <div class="flex items-center absolute bottom-7 right-1 w-[105px] justify-start gap-3">
          <!-- 리얼 트레드 타이어 모듈 -->
          <div class="w-4 h-12 bg-slate-800 rounded border-y border-slate-650 flex flex-col justify-between items-center py-0.5 shadow-md">
            <span class="w-full h-[1px] bg-slate-600/50"></span>
            <div class="w-2 h-5 bg-gradient-to-r from-slate-500 to-slate-400 rounded-sm flex items-center justify-center">
              <span class="w-1 h-3 bg-emerald-400/40 rounded-full"></span>
            </div>
            <span class="w-full h-[1px] bg-slate-600/50"></span>
          </div>
          <div class="flex flex-col items-start">
            <span class="text-sm font-black text-gray-800 leading-none">42</span>
            <span class="text-[9px] text-emerald-600 font-bold mt-1 bg-emerald-50 px-1 rounded border border-emerald-100">정상</span>
          </div>
        </div>

      </div>
    </div>
    <!-- ==========================================
         [ TPMS 컴포넌트 끝 ]
         ========================================== -->

  </div>

</body>
</html>
